name: Embedded C Static Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures blame data is available

      - name: Install Bear and GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y bear build-essential

      - name: Generate Compilation Database
        run: |
          echo "#!/bin/sh" > fake_build.sh
          
          # This automatically adapts whether your files are in root or a folder
          # It finds all .c files anywhere in the workspace
          find . -name "*.c" -not -path "*/.*" | while read file; do
            dir=$(dirname "$file")
            echo "gcc -fsyntax-only -I$dir $file" >> fake_build.sh
          done
          
          echo "=== Generated Build Script ==="
          cat fake_build.sh
          echo "=============================="
          
          chmod +x fake_build.sh
          bear -- ./fake_build.sh
          
          echo "=== Generated Compilation Database ==="
          cat compile_commands.json
          echo "======================================"

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.cfamily.skipUnsupportedCompilers=true
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
