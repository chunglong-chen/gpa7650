name: Embedded C Static Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      # This forces the runner to try using Node 24 and silences the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bear and GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y bear build-essential

      - name: Fake Build to Generate Compilation Database
        run: |
          echo "#!/bin/sh" > fake_build.sh
          
          # Find files inside 'src' (or change to '.' if your files are in the root directory)
          find src -name "*.c" | while read file; do
            echo "gcc -fsyntax-only -Isrc $file" >> fake_build.sh
          done
          
          chmod +x fake_build.sh
          bear -- ./fake_build.sh

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          # We pass the bypass flags directly as arguments to the scanner binary
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.cfamily.skipUnsupportedCompilers=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
