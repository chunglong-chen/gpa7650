name: Embedded C Static Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures blame data is available

      - name: Install Bear and GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y bear build-essential

      - name: Generate Compilation Database
        run: |
          mkdir -p ./.github_stubs
          echo "#!/bin/sh" > fake_build.sh
          
          # 1. Gather all unique directories containing YOUR headers
          INCLUDES="-I./.github_stubs"
          while read -r dir; do
            INCLUDES="$INCLUDES -I$dir"
          done < <(find . -name "*.h" -not -path "*/.*" -exec dirname {} \; | sort -u)
          
          # 2. Write the base compilation script
          find . -name "*.c" -not -path "*/.*" | while read -r file; do
            echo "gcc -fsyntax-only $INCLUDES \$@" >> fake_build.sh
          done
          chmod +x fake_build.sh

          echo "=== Iteratively Resolving Missing Headers ==="
          # 3. Loop to find missing headers and stub them until gcc passes
          MAX_ATTEMPTS=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i to run fake_build.sh..."
            
            # Run the script and capture standard error to find missing files
            MISSING_HEADER=$(./fake_build.sh 2>&1 | grep -E "fatal error: .* No such file or directory" | head -n 1 | sed -E "s/.*fatal error: (.*): No such file.*/\1/")
            
            if [ -z "$MISSING_HEADER" ]; then
              echo "All header dependencies resolved!"
              break
            fi
            
            echo "Found missing header: $MISSING_HEADER. Creating stub..."
            touch "./.github_stubs/$MISSING_HEADER"
          done

          echo "=== Generating Final Compilation Database ==="
          # 4. Now that GCC can pass without fatal errors, let Bear record it
          bear -- ./fake_build.sh > /dev/null 2>&1 || true
          
          echo "=== Generated Compilation Database ==="
          if [ -f compile_commands.json ]; then
            # Print a quick summary instead of the entire giant json
            head -n 30 compile_commands.json
            echo "... (truncated) ..."
          else
            echo "ERROR: compile_commands.json was not generated!" && exit 1
          fi
          echo "======================================"

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.cfamily.skipUnsupportedCompilers=true
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
